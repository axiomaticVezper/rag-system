name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion pipeline to populate Qdrant
        run: python scripts/run_ingestion_pipeline.py

      - name: Run deterministic tests (skip LLM-dependent tests)
        run: |
          pytest -v \
            --ignore=tests/test_ollama_generator.py \
            --ignore=tests/test_rag_pipeline.py \
            --ignore=tests/test_evaluation.py \
            -q